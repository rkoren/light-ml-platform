name: ML Pipeline CI/CD
# Reusable workflow — call from project repos:
#
#   jobs:
#     pipeline:
#       uses: rkoren/light-ml-platform/.github/workflows/ml-pipeline.yml@main
#       with:
#         ecr-repository: my-project-serve
#         tf-state-key: my-project/terraform.tfstate
#       secrets:
#         AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
#         TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.11"
      ecr-repository:
        required: true
        type: string
      dockerfile:
        type: string
        default: "src/serve/Dockerfile"
      docker-context:
        type: string
        default: "."
      infra-spec:
        type: string
        default: "infra.yaml"
      tf-state-key:
        required: true
        type: string
      aws-region:
        type: string
        default: "us-east-1"
    secrets:
      AWS_ROLE_ARN:
        required: true
      TF_STATE_BUCKET:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: infra-apply
    if: github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push serving image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build \
            -t $ECR_REGISTRY/${{ inputs.ecr-repository }}:latest \
            -f ${{ inputs.dockerfile }} \
            ${{ inputs.docker-context }}
          docker push $ECR_REGISTRY/${{ inputs.ecr-repository }}:latest

  infra-plan:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install recipes
        run: pip install "recipes @ git+https://github.com/rkoren/light-ml-platform#subdirectory=recipes"

      - name: Generate Terraform
        run: recipes generate ${{ inputs.infra-spec }} --out tf

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Terraform Init
        working-directory: tf
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ inputs.tf-state-key }}" \
            -backend-config="region=${{ inputs.aws-region }}"

      - name: Terraform Plan
        working-directory: tf
        run: terraform plan

  infra-apply:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install recipes
        run: pip install "recipes @ git+https://github.com/rkoren/light-ml-platform#subdirectory=recipes"

      - name: Generate Terraform
        run: recipes generate ${{ inputs.infra-spec }} --out tf

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Terraform Init
        working-directory: tf
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ inputs.tf-state-key }}" \
            -backend-config="region=${{ inputs.aws-region }}"

      - name: Terraform Apply
        working-directory: tf
        run: terraform apply -auto-approve
