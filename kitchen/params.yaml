# Pipeline configuration — copy to your project repo and fill in values.

data:
  # Source type: kaggle | s3 | local
  source: kaggle

  # Kaggle competition slug (required when source: kaggle)
  # competition: march-machine-learning-mania-2026

  # S3 source (required when source: s3)
  # bucket: my-data-bucket
  # prefix: raw/

  # Local source (required when source: local)
  # path: /path/to/data

  target_col: target
  test_size: 0.2
  random_seed: 42

features:
  numeric_impute_strategy: median        # median | mean | most_frequent
  categorical_impute_strategy: most_frequent
  scale: true

train:
  model: xgboost                         # xgboost | random_forest | logistic_regression
  n_estimators: 100
  max_depth: 6
  learning_rate: 0.1
  random_seed: 42
  cv_folds: 5
