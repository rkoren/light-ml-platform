[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rkoren-recipes"
version = "0.1.0"
description = "YAML spec → Terraform config generator for AWS resources"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Reilly Koren", email = "reillyhkoren@gmail.com"},
]
keywords = ["terraform", "iac", "aws", "infrastructure-as-code", "mlops"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: System :: Systems Administration",
]
dependencies = [
    "typer>=0.12",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "jinja2>=3.1",
    "rich>=13.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
    "ruff",
]

[project.urls]
Homepage = "https://github.com/rkoren/light-ml-platform"
Repository = "https://github.com/rkoren/light-ml-platform"
Issues = "https://github.com/rkoren/light-ml-platform/issues"

[project.scripts]
recipes = "recipes.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["recipes"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --cov=recipes --cov-report=term-missing"

[tool.ruff]
line-length = 100
target-version = "py311"
