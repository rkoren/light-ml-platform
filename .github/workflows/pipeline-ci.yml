name: pipeline-ci

on:
  push:
    paths:
      - "pipeline/**"
  pull_request:
    paths:
      - "pipeline/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v --cov=src

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build serving image
        run: docker build -t pipeline-serve ./pipeline/src/serve
