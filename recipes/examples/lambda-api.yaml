# Example spec: image-based Lambda with an S3 bucket and IAM role
name: my-api
region: us-east-1

resources:
  - type: s3
    name: my-api-artifacts
    versioning: true

  - type: iam_role
    name: my-api-exec
    service: lambda.amazonaws.com
    policies:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  - type: lambda
    name: my-api
    role: my-api-exec
    image_uri: "123456789.dkr.ecr.us-east-1.amazonaws.com/my-api:latest"
    memory: 512
    timeout: 30
