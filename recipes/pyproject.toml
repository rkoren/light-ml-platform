[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "recipes"
version = "0.1.0"
description = "YAML spec → Terraform config generator for AWS resources"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "jinja2>=3.1",
    "rich>=13.0",
]

[project.scripts]
recipes = "recipes.cli:app"

[tool.hatch.envs.default]
dependencies = [
    "pytest>=8.0",
    "pytest-cov",
    "ruff",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --cov=recipes --cov-report=term-missing"

[tool.ruff]
line-length = 100
target-version = "py311"
