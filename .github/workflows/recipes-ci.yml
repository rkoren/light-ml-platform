name: recipes-ci

on:
  push:
    paths:
      - "recipes/**"
  pull_request:
    paths:
      - "recipes/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recipes

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v --cov=recipes
