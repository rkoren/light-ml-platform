stages:
  # Framework-provided: downloads raw data based on params.yaml[data.source]
  ingest:
    cmd: python -m kitchen.ingest.run
    deps:
      - pipeline/ingest/run.py
    params:
      - params.yaml:
          - data.source
    outs:
      - data/raw/

  # Project-defined: implement src/features/run.py in your project repo
  features:
    cmd: python src/features/run.py
    deps:
      - src/features/run.py
      - data/raw/
    params:
      - params.yaml:
          - features
    outs:
      - data/processed/

  # Project-defined: implement src/train/run.py in your project repo
  train:
    cmd: python src/train/run.py
    deps:
      - src/train/run.py
      - data/processed/
    params:
      - params.yaml:
          - train
    outs:
      - models/

  # Project-defined: implement src/evaluate/run.py in your project repo
  evaluate:
    cmd: python src/evaluate/run.py
    deps:
      - src/evaluate/run.py
      - models/
      - data/processed/
    metrics:
      - metrics.json:
          cache: false
